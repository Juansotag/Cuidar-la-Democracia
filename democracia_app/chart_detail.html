<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Pregunta – Estudio sobre Democracia 2025</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- noUiSlider -->
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.js"></script>

    <!-- Choices.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <!-- Compartir via clipboard -->
    <script src="https://cdn.jsdelivr.net/npm/canvas2svg@1.0.20/canvas2svg.min.js"></script>

    <link rel="stylesheet" href="./styles.css">
    <style>
        /* Estilos específicos de la página de detalle */
        body {
            overflow: hidden;
            height: 100vh;
        }

        .detail-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ── Sidebar ── */
        .detail-sidebar {
            width: 350px;
            min-width: 350px;
            background: #ffffff;
            border-right: 1px solid var(--border-color);
            padding: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
            height: 100vh;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: all 0.2s ease;
            width: fit-content;
        }

        .detail-sidebar .back-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .brand-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(to right, #002366, #800020);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .brand-header p {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .stats-row {
            display: flex;
            gap: 0.75rem;
        }

        .stats-row .stat-card {
            flex: 1;
            min-width: 0;
            padding: 1rem;
        }

        .stats-row .stat-value {
            font-size: 1.6rem;
        }

        .filters-block h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .filter-group {
            margin-bottom: 1.25rem;
        }

        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        .slider-values {
            font-size: 0.78rem;
            color: var(--accent);
            text-align: right;
            margin-top: 8px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .action-btns button {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-reset:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn-share {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 35, 102, 0.15);
        }

        .btn-share:hover {
            background: #001a4d;
        }

        .btn-download {
            background: transparent;
            border: 1px solid #800020;
            color: #800020;
        }

        .btn-download:hover {
            background: #800020;
            color: #fff;
        }

        /* Nota de copiado */
        .copy-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }

        .copy-toast.show {
            opacity: 1;
        }

        /* ── Contenido Principal ── */
        .detail-main {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            height: 100vh;
        }

        .question-header {
            border-left: 4px solid var(--accent);
            padding-left: 1.25rem;
        }

        .question-header .section-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #800020;
            margin-bottom: 0.5rem;
        }

        .question-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .question-header p.context-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.5;
        }

        /* Gráfica grande */
        .chart-full-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-legend-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .view-toggle button {
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .view-toggle button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .canvas-full {
            position: relative;
            min-height: 420px;
            flex: 1;
        }

        /* Tabla de datos */
        .data-table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .data-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: rgba(0, 35, 102, 0.05);
            color: var(--accent);
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }

        .data-table td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .data-table tr:hover td {
            background: rgba(0, 35, 102, 0.03);
        }

        .data-table .td-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .data-table .mini-bar {
            height: 10px;
            border-radius: 5px;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        /* Gráficas de P7 (múltiples) */
        .multi-chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2rem;
        }

        .multi-chart-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .multi-chart-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        /* ── Comparar Grupos ── */
        .compare-block {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .compare-block h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .seg-select {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            font-size: 0.875rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        .seg-hint {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 0.75rem;
        }

        .seg-zone-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        .seg-unassigned-area {
            margin-bottom: 0.75rem;
        }

        .seg-group-box {
            border-radius: 10px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.6rem;
        }

        .box-a {
            background: rgba(42, 41, 95, 0.05);
            border: 1px solid rgba(42, 41, 95, 0.2);
        }

        .box-b {
            background: rgba(0, 174, 239, 0.05);
            border: 1px solid rgba(0, 174, 239, 0.2);
        }

        .seg-group-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .seg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-a {
            background: #2a2b5f;
        }

        .dot-b {
            background: #00aeef;
        }

        .seg-group-name {
            font-size: 0.78rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text-primary);
            flex: 1;
            padding: 0;
        }

        .seg-group-count {
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            padding: 0.1rem 0.45rem;
            color: var(--text-secondary);
        }

        .seg-chips-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            min-height: 24px;
        }

        .seg-chip {
            padding: 0.22rem 0.55rem;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.18s;
            user-select: none;
        }

        .seg-chip.unassigned {
            background: #f1f5f9;
            color: #475569;
            border-color: #e2e8f0;
        }

        .seg-chip.unassigned:hover {
            background: #e2e8f0;
        }

        .seg-chip.group-a {
            background: rgba(42, 41, 95, 0.12);
            color: #2a2b5f;
            border-color: #2a2b5f;
        }

        .seg-chip.group-b {
            background: rgba(0, 174, 239, 0.12);
            color: #00aeef;
            border-color: #00aeef;
        }

        .btn-clear-seg {
            width: 100%;
            margin-top: 0.6rem;
            padding: 0.45rem;
            border-radius: 7px;
            font-size: 0.75rem;
            font-weight: 600;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-seg:hover {
            background: #f1f5f9;
        }

        /* Barra resumen de grupos en el gráfico */
        .compare-info-bar {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }

        .compare-info-item {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.82rem;
        }

        .compare-info-label {
            font-weight: 700;
            min-width: 80px;
            flex-shrink: 0;
        }

        .compare-info-vals {
            color: #475569;
            line-height: 1.4;
        }

        /* Sliders de comparación de edad */
        .seg-age-container {
            margin-top: 0.8rem;
            padding: 0 0.5rem 1rem;
            display: none;
        }

        .seg-age-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            display: block;
        }

        .seg-age-slider {
            height: 6px !important;
        }

        .seg-age-slider .noUi-connect {
            background: #64748b;
        }

        .box-a .seg-age-slider .noUi-connect {
            background: #2a2b5f;
        }

        .box-b .seg-age-slider .noUi-connect {
            background: #00aeef;
        }

        .seg-age-slider .noUi-handle {
            width: 14px !important;
            height: 14px !important;
            right: -7px !important;
            top: -5px !important;
            border-radius: 50%;
            box-shadow: none;
            border: 2px solid #fff;
        }

        .seg-age-slider .noUi-handle::before,
        .seg-age-slider .noUi-handle::after {
            display: none;
        }
    </style>
</head>

<body>
    <div class="detail-layout">
        <!-- Sidebar de Filtros -->
        <aside class="detail-sidebar">
            <div class="brand-header" style="padding: 0; background: #eeeeee;">
                <a href="https://www.javeriana.edu.co/hoy-en-la-javeriana/w/noticia-la-javeriana-presenta-resultados-de-cuidar-la-democracia-92-de-los-colombianos-cree-que-su-voto-hace-la-diferencia" target="_blank">
                    <img src="./assets/cuidar la democracia.png" alt="Cuidar la Democracia" style="width: 100%; display: block; border-bottom: 1px solid var(--border-color);">
                </a>
            </div>
            
            <div class="sidebar-content">
                <a href="./index.html" class="back-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Volver al Dashboard
                </a>

                <div class="filters-block">
                    <h3>Filtros de Población y Territorio</h3>

                    <div class="stats-row mb-4">
                        <div class="stat-card">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value" id="stat-filtered">0</span>
                            <span class="stat-label">Filtrados</span>
                        </div>
                    </div>

                <div class="filter-group">
                    <label>Rango de Edad</label>
                    <div id="age-slider" class="mt-2 mb-4"></div>
                    <div class="slider-values">
                        <span id="age-min">18</span> – <span id="age-max">100</span> años
                    </div>
                </div>

                <div class="filter-group">
                    <label for="filter-sexo">Sexo</label>
                    <select id="filter-sexo" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-genero">Identidad de Género</label>
                    <select id="filter-genero" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-educacion">Nivel Educativo</label>
                    <select id="filter-educacion" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-actividad">Ocupación / Actividad</label>
                    <select id="filter-actividad" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-estrato">Estrato</label>
                    <select id="filter-estrato" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-depto">Departamento</label>
                    <select id="filter-depto" multiple></select>
                </div>
                <div class="filter-group">
                    <label for="filter-muni">Municipio</label>
                    <select id="filter-muni" multiple></select>
                </div>
            </div>

            <!-- Comparar Grupos -->
            <div class="compare-block">
                <h3>Comparar Grupos</h3>
                <div class="filter-group">
                    <label for="seg-variable">Variable de segmentación</label>
                    <select id="seg-variable" class="seg-select">
                        <option value="">Sin comparación</option>
                        <option value="SEXO">Sexo</option>
                        <option value="GÉNERO">Identidad de Género</option>
                        <option value="EDUCACION">Nivel Educativo</option>
                        <option value="ESTRATO">Estrato</option>
                        <option value="EDAD">Edad</option>
                        <option value="ACTIVIDAD">Ocupación</option>
                        <option value="DEPARTAMENTO">Departamento</option>
                        <option value="MUNICIPIO">Municipio</option>
                    </select>
                </div>

                <div id="seg-groups-ui" style="display:none">
                    <p class="seg-hint">Haga clic en un valor para asignarlo a un grupo.</p>

                    <!-- Zona sin asignar -->
                    <div class="seg-unassigned-area">
                        <p class="seg-zone-label">Valores disponibles</p>
                        <div class="seg-chips-area" id="chips-unassigned"></div>
                    </div>

                    <!-- Grupo A -->
                    <div class="seg-group-box box-a">
                        <div class="seg-group-header">
                            <span class="seg-dot dot-a"></span>
                            <input class="seg-group-name" id="seg-name-a" value="Grupo A" />
                            <span class="seg-group-count" id="cnt-a">0</span>
                        </div>
                        <div class="seg-chips-area" id="chips-a"></div>
                        <div class="seg-age-container" id="age-box-a">
                            <span class="seg-age-label">Rango: <span id="age-range-a-txt">18-99</span> años</span>
                            <div id="seg-age-slider-a" class="seg-age-slider"></div>
                        </div>
                    </div>

                    <!-- Grupo B -->
                    <div class="seg-group-box box-b">
                        <div class="seg-group-header">
                            <span class="seg-dot dot-b"></span>
                            <input class="seg-group-name" id="seg-name-b" value="Grupo B" />
                            <span class="seg-group-count" id="cnt-b">0</span>
                        </div>
                        <div class="seg-chips-area" id="chips-b"></div>
                        <div class="seg-age-container" id="age-box-b">
                            <span class="seg-age-label">Rango: <span id="age-range-b-txt">18-99</span> años</span>
                            <div id="seg-age-slider-b" class="seg-age-slider"></div>
                        </div>
                    </div>

                    <button class="btn-clear-seg" id="btn-clear-seg">Limpiar asignación</button>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn-reset" id="btn-reset">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Restablecer Filtros
                </button>
                <button class="btn-share" id="btn-share">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    Compartir Enlace con Filtros
                </button>
                <button class="btn-download" id="btn-download">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Exportar Imagen (PNG)
                </button>
            </div>
        </aside>

        <div class="main-wrapper">
            <main class="main-content">
                <div class="question-header">
                    <div class="section-badge" id="section-badge">Cargando...</div>
                    <h1 id="question-title">Cargando pregunta...</h1>
                    <p class="context-desc" id="question-context" style="display:none"></p>
                </div>

                <!-- Zona de gráfica única -->
                <div id="single-chart-zone">
                    <div class="chart-full-card">
                        <div class="chart-legend-row">
                            <div class="view-toggle" id="view-toggle">
                                <button id="view-chart" class="active">Gráfica</button>
                                <button id="view-table">Tabla</button>
                            </div>
                        </div>
                        <div id="compare-info-bar" class="compare-info-bar" style="display:none"></div>
                        <div id="chart-view" class="canvas-full">
                            <canvas id="main-canvas"></canvas>
                        </div>
                        <div id="table-view" class="data-table-container" style="display:none"></div>
                    </div>
                </div>

                <!-- Zona para preguntas P7 (múltiples subgráficas) -->
                <div id="multi-chart-zone" style="display:none">
                    <div class="multi-chart-grid" id="multi-grid"></div>
                </div>
            </main>

            <footer class="app-footer">
